<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Courier New', monospace;
    overflow-x: hidden;
    min-height: 100vh;
  }
  #header {
    text-align: center;
    padding: 20px;
    background: linear-gradient(180deg, #0a0a2e 0%, transparent 100%);
  }
  #header h1 {
    font-size: 22px;
    letter-spacing: 6px;
    color: #7df9ff;
    text-shadow: 0 0 20px #7df9ff88;
    font-weight: 300;
    text-transform: uppercase;
  }
  #header p {
    font-size: 11px;
    color: #8888aa;
    letter-spacing: 3px;
    margin-top: 6px;
  }

  #controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    padding: 6px 14px;
    border: 1px solid #334;
    background: #111128;
    color: #aab;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .ctrl-btn:hover, .ctrl-btn.active {
    border-color: #7df9ff;
    color: #7df9ff;
    background: #071a1f;
    box-shadow: 0 0 8px #7df9ff44;
  }

  #view-tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 8px;
  }
  .view-tab {
    padding: 5px 16px;
    border: 1px solid #223;
    background: #0d0d20;
    color: #778;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .view-tab.active {
    border-color: #ff79c6;
    color: #ff79c6;
    background: #1a0d18;
    box-shadow: 0 0 8px #ff79c644;
  }

  #scene-container {
    width: 100%;
    height: 500px;
    position: relative;
    perspective: 900px;
    cursor: grab;
    overflow: hidden;
  }
  #scene-container:active { cursor: grabbing; }

  #scene {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.05s linear;
  }

  .el-card {
    position: absolute;
    width: 54px;
    height: 54px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.4s ease, box-shadow 0.3s ease;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .el-card:hover {
    transform: translateZ(20px) scale(1.12) !important;
    z-index: 100;
    box-shadow: 0 0 18px currentColor;
  }
  .el-num {
    font-size: 9px;
    opacity: 0.7;
    line-height: 1;
  }
  .el-sym {
    font-size: 17px;
    font-weight: bold;
    line-height: 1.1;
  }
  .el-name {
    font-size: 7px;
    opacity: 0.6;
    line-height: 1;
    text-align: center;
  }
  .el-mass {
    font-size: 7px;
    opacity: 0.5;
  }

  /* Category colors */
  .cat-alkali      { background: #1a1a3a; border-color: #ff6b6b; color: #ff9999; }
  .cat-alkaline    { background: #1a2a1a; border-color: #ffd93d; color: #ffe680; }
  .cat-transition  { background: #0f1a2a; border-color: #74b9ff; color: #a0ccff; }
  .cat-post        { background: #1a1a2a; border-color: #81ecec; color: #b0f0f0; }
  .cat-metalloid   { background: #1a2a2a; border-color: #55efc4; color: #88ffdd; }
  .cat-nonmetal    { background: #2a1a2a; border-color: #fd79a8; color: #ffaac8; }
  .cat-noble       { background: #2a1a3a; border-color: #a29bfe; color: #c4baff; }
  .cat-lanthanide  { background: #2a1a1a; border-color: #e17055; color: #ff9f7f; }
  .cat-actinide    { background: #2a2a1a; border-color: #fdcb6e; color: #ffe0a0; }

  /* Sphere view */
  .sphere-view .el-card {
    width: 50px;
    height: 50px;
    border-radius: 50% !important;
    border-width: 2px;
  }
  /* Cylinder view */
  .cylinder-view .el-card {
    width: 50px;
    height: 66px;
    border-radius: 6px 6px 6px 6px;
  }

  #info-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #0d0d22ee;
    border: 1px solid #7df9ff;
    border-radius: 10px;
    padding: 24px 28px;
    min-width: 260px;
    z-index: 1000;
    box-shadow: 0 0 40px #7df9ff44;
    display: none;
    backdrop-filter: blur(10px);
    animation: panelIn 0.25s ease;
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translate(-50%, -48%) scale(0.95); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  #info-panel h2 { font-size: 32px; color: #7df9ff; letter-spacing: 2px; }
  #info-panel h3 { font-size: 14px; color: #aabbcc; margin-bottom: 12px; font-weight: 300; }
  #info-panel table { width: 100%; font-size: 12px; border-collapse: collapse; }
  #info-panel td { padding: 4px 6px; }
  #info-panel td:first-child { color: #778899; }
  #info-panel td:last-child { color: #ddeeff; text-align: right; }
  #info-panel tr:nth-child(odd) td { background: rgba(255,255,255,0.03); }
  #close-btn {
    position: absolute;
    top: 8px; right: 12px;
    background: none;
    border: none;
    color: #7df9ff;
    font-size: 18px;
    cursor: pointer;
  }

  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 12px 20px 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #8899aa;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .legend-item:hover { border-color: #445; background: #111; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  #rotate-hint {
    text-align: center;
    font-size: 10px;
    color: #445566;
    padding-bottom: 8px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Periodic Table</h1>
  <p>Interactive 3D · 118 Elements</p>
</div>

<div id="view-tabs">
  <button class="view-tab active" onclick="setShape('box')">⬛ Box</button>
  <button class="view-tab" onclick="setShape('sphere')">⚪ Sphere</button>
  <button class="view-tab" onclick="setShape('cylinder')">🔵 Cylinder</button>
  <button class="view-tab" onclick="setShape('flat')">⬜ Flat</button>
</div>

<div id="controls">
  <button class="ctrl-btn active" onclick="filterCat('all')">All</button>
  <button class="ctrl-btn" onclick="filterCat('alkali')">Alkali</button>
  <button class="ctrl-btn" onclick="filterCat('alkaline')">Alkaline</button>
  <button class="ctrl-btn" onclick="filterCat('transition')">Transition</button>
  <button class="ctrl-btn" onclick="filterCat('nonmetal')">Non-metal</button>
  <button class="ctrl-btn" onclick="filterCat('noble')">Noble Gas</button>
  <button class="ctrl-btn" onclick="filterCat('lanthanide')">Lanthanide</button>
  <button class="ctrl-btn" onclick="filterCat('actinide')">Actinide</button>
</div>

<div id="rotate-hint">drag to rotate · click element for details</div>

<div id="scene-container">
  <div id="scene"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>Alkali</div>

  <div class="legend-item"><div class="legend-dot" style="background:#74b9ff"></div>Transition</div>
  <div class="legend-item"><div class="legend-dot" style="background:#81ecec"></div>Post-transition</div>
  <div class="legend-item"><div class="legend-dot" style="background:#55efc4"></div>Metalloid</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fd79a8"></div>Non-metal</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a29bfe"></div>Noble Gas</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e17055"></div>Lanthanide</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fdcb6e"></div>Actinide</div>
</div>

<div id="info-panel">
  <button id="close-btn" onclick="closeInfo()">✕</button>
  <h2 id="ip-sym"></h2>
  <h3 id="ip-name"></h3>
  <table>
    <tr><td>Atomic Number</td><td id="ip-num"></td></tr>
    <tr><td>Atomic Mass</td><td id="ip-mass"></td></tr>
    <tr><td>Category</td><td id="ip-cat"></td></tr>

    <tr><td>Group</td><td id="ip-group"></td></tr>
    <tr><td>State at 25°C</td><td id="ip-state"></td></tr>
    <tr><td>Electron Config</td><td id="ip-config"></td></tr>
  </table>
</div>

// Grid layout mapping: period -> group -> position
function getGridPos(el) {
  let col = el.g - 1;
  // Groups 3-12 start at index 2
  // Insert gap after group 2 (index 1) for groups 1-2 then 13-18
  if (el.g >= 3 && el.g <= 12) col = el.g - 1;
  else if (el.g > 12) col = el.g - 1; // col 12..17
  
  let row = el.p - 1;
  // Lanthanides row 5 (index 5 in 0-based)
  if (el.cat === 'lanthanide') { row = 8; col = (el.n - 57) + 2; }
  if (el.cat === 'actinide' && el.n >= 89 && el.n <= 103) { row = 9; col = (el.n - 89) + 2; }
  return { row, col };
}

const CARD_W = 54, CARD_H = 54, GAP = 4;
const TOTAL_COLS = 18;
const scene = document.getElementById('scene');
const container = document.getElementById('scene-container');

let rotX = -18, rotY = 18;
let targetRotX = -18, targetRotY = 18;
let isDragging = false, lastX, lastY;
let currentShape = 'box';
let currentFilter = 'all';
let cards = [];
let animFrame;

function buildTable() {
  scene.innerHTML = '';
  cards = [];

  const rows = 10, cols = 18;
  const totalW = cols * (CARD_W + GAP);
  const totalH = rows * (CARD_H + GAP);
  const offsetX = -totalW / 2;
  const offsetY = -totalH / 2;

  elements.forEach(el => {
    const pos = getGridPos(el);
    const x = offsetX + pos.col * (CARD_W + GAP);
    const y = offsetY + pos.row * (CARD_H + GAP);

    // 3D Z offset based on atomic number for layered effect
    const zBase = currentShape === 'flat' ? 0 : (Math.sin(pos.row * 0.4) * 30 + Math.cos(pos.col * 0.3) * 20);

    const card = document.createElement('div');
    card.className = `el-card cat-${el.cat}`;
    card.innerHTML = `<span class="el-num">${el.n}</span><span class="el-sym">${el.s}</span><span class="el-name">${el.name.length > 9 ? el.name.slice(0,8)+'…' : el.name}</span><span class="el-mass">${el.mass}</span>`;

    card.style.left = (container.offsetWidth/2 + x) + 'px';
    card.style.top = (container.offsetHeight/2 + y) + 'px';
    card.style.transform = `translateZ(${zBase}px)`;
    card.dataset.z = zBase;
    card.dataset.x = x;
    card.dataset.y = y;
    card.dataset.idx = elements.indexOf(el);

    card.addEventListener('click', (e) => {
      e.stopPropagation();
      showInfo(el);
    });

    if (currentFilter !== 'all' && el.cat !== currentFilter) {
      card.style.opacity = '0.12';
      card.style.filter = 'grayscale(1)';
    }

    scene.appendChild(card);
    cards.push(card);
  });
}

function setShape(shape) {
  currentShape = shape;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (shape === 'sphere') {
    scene.classList.add('sphere-view');
    scene.classList.remove('cylinder-view');
  } else if (shape === 'cylinder') {
    scene.classList.add('cylinder-view');
    scene.classList.remove('sphere-view');
  } else {
    scene.classList.remove('sphere-view','cylinder-view');
  }
  buildTable();
}

function filterCat(cat) {
  currentFilter = cat;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  cards.forEach((card, i) => {
    const el = elements[parseInt(card.dataset.idx)];
    if (cat === 'all' || el.cat === cat) {
      card.style.opacity = '1';
      card.style.filter = 'none';
    } else {
      card.style.opacity = '0.1';
      card.style.filter = 'grayscale(1)';
    }
  });
}

function showInfo(el) {
  document.getElementById('ip-sym').textContent = el.s;
  document.getElementById('ip-name').textContent = el.name;
  document.getElementById('ip-num').textContent = el.n;
  document.getElementById('ip-mass').textContent = el.mass + ' u';
  document.getElementById('ip-cat').textContent = el.cat.charAt(0).toUpperCase()+el.cat.slice(1);
  document.getElementById('ip-period').textContent = el.p;
  document.getElementById('ip-group').textContent = el.g;
  document.getElementById('ip-state').textContent = el.state;
  document.getElementById('ip-config').textContent = el.cfg;
  document.getElementById('info-panel').style.display = 'block';
}
function closeInfo() {
  document.getElementById('info-panel').style.display = 'none';
}
document.getElementById('info-panel').addEventListener('click', e => e.stopPropagation());
document.addEventListener('click', closeInfo);

// Drag rotation
container.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetRotY += (e.clientX - lastX) * 0.4;
  targetRotX -= (e.clientY - lastY) * 0.4;
  targetRotX = Math.max(-60, Math.min(60, targetRotX));
  lastX = e.clientX; lastY = e.clientY;
});
document.addEventListener('mouseup', () => isDragging = false);

// Touch
container.addEventListener('touchstart', e => {
  isDragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  targetRotY += (e.touches[0].clientX - lastX) * 0.4;
  targetRotX -= (e.touches[0].clientY - lastY) * 0.4;
  targetRotX = Math.max(-60, Math.min(60, targetRotX));
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', () => isDragging = false);

// Smooth animation loop
function animate() {
  rotX += (targetRotX - rotX) * 0.1;
  rotY += (targetRotY - rotY) * 0.1;
  scene.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  if (!isDragging) targetRotY += 0.15;
  animFrame = requestAnimationFrame(animate);
}

buildTable();
animate();

window.addEventListener('resize', buildTable);
</script>
