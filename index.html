<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #060612;
  color: #e0e0ff;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

#ui-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
}

#title {
  margin-top: 14px;
  font-size: 13px;
  letter-spacing: 8px;
  color: #7df9ff;
  text-shadow: 0 0 24px #7df9ff66;
  font-weight: 300;
  text-transform: uppercase;
  pointer-events: none;
}

#shape-tabs {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  pointer-events: all;
}
.stab {
  padding: 5px 14px;
  border: 1px solid #223;
  background: rgba(10,10,30,0.85);
  color: #668;
  font-size: 10px;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.25s;
  backdrop-filter: blur(6px);
}
.stab:hover { border-color: #446; color: #99b; }
.stab.active {
  border-color: #7df9ff;
  color: #7df9ff;
  background: rgba(7,26,31,0.9);
  box-shadow: 0 0 10px #7df9ff33;
}

#filter-row {
  margin-top: 7px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
  pointer-events: all;
}
.fbtn {
  padding: 4px 10px;
  border: 1px solid #223;
  background: rgba(10,10,30,0.8);
  color: #556;
  font-size: 9px;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.fbtn:hover { border-color: #445; color: #889; }
.fbtn.active { border-color: #ff79c6; color: #ff79c6; background: rgba(26,13,24,0.85); }

#hint {
  margin-top: 7px;
  font-size: 9px;
  color: #334455;
  letter-spacing: 3px;
  pointer-events: none;
}

/* Canvas fills screen */
#canvas3d {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  cursor: grab;
}
#canvas3d:active { cursor: grabbing; }

/* Info panel */
#info-panel {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%);
  background: rgba(8,8,28,0.95);
  border: 1px solid #7df9ff55;
  border-radius: 12px;
  padding: 18px 24px;
  min-width: 300px;
  z-index: 200;
  display: none;
  backdrop-filter: blur(16px);
  animation: slideUp 0.2s ease;
  box-shadow: 0 0 40px #7df9ff22;
}
@keyframes slideUp {
  from { opacity:0; transform: translateX(-50%) translateY(10px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}
#info-panel .ip-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 12px;
}
#ip-sym { font-size: 36px; color: #7df9ff; letter-spacing: 2px; line-height: 1; }
#ip-name { font-size: 13px; color: #aabbcc; font-weight: 300; }
#ip-num-badge {
  margin-left: auto;
  font-size: 11px;
  color: #445566;
  border: 1px solid #223;
  border-radius: 3px;
  padding: 2px 8px;
}
#info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
  font-size: 11px;
}
.ig-row { display: contents; }
.ig-label { color: #556677; }
.ig-val { color: #ccddef; text-align: right; }
#close-info {
  position: absolute;
  top: 10px; right: 14px;
  background: none; border: none;
  color: #446; font-size: 16px;
  cursor: pointer;
}
#close-info:hover { color: #7df9ff; }

/* Legend */
#legend {
  position: fixed;
  bottom: 14px; left: 14px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 100;
  font-size: 9px;
  opacity: 0.6;
  pointer-events: none;
}
.leg { display: flex; align-items: center; gap: 5px; color: #8899aa; }
.legdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<div id="ui-top">
  <div id="title">Periodic Table · 3D</div>
  <div id="shape-tabs">
    <button class="stab active" data-shape="flat">⬛ Flat</button>
    <button class="stab" data-shape="wave">〰 Wave</button>
    <button class="stab" data-shape="cylinder">🔵 Cylinder</button>
    <button class="stab" data-shape="sphere">🌐 Sphere</button>
    <button class="stab" data-shape="spiral">🌀 Spiral</button>
    <button class="stab" data-shape="helix">🧬 Helix</button>
    <button class="stab" data-shape="mountain">⛰ Mountain</button>
  </div>
  <div id="filter-row">
    <button class="fbtn active" data-cat="all">All</button>
    <button class="fbtn" data-cat="alkali">Alkali</button>
    <button class="fbtn" data-cat="alkaline">Alkaline</button>
    <button class="fbtn" data-cat="transition">Transition</button>
    <button class="fbtn" data-cat="nonmetal">Non-metal</button>
    <button class="fbtn" data-cat="noble">Noble Gas</button>
    <button class="fbtn" data-cat="lanthanide">Lanthanide</button>
    <button class="fbtn" data-cat="actinide">Actinide</button>
  </div>
  <div id="hint">drag to rotate · scroll to zoom · click element</div>
</div>

<canvas id="canvas3d"></canvas>

<div id="info-panel">
  <button id="close-info">✕</button>
  <div class="ip-header">
    <span id="ip-sym"></span>
    <span id="ip-name"></span>
    <span id="ip-num-badge">#<span id="ip-num"></span></span>
  </div>
  <div id="info-grid">
    <span class="ig-label">Atomic Mass</span><span class="ig-val" id="ip-mass"></span>
    <span class="ig-label">Category</span><span class="ig-val" id="ip-cat"></span>
    <span class="ig-label">Period</span><span class="ig-val" id="ip-period"></span>
    <span class="ig-label">Group</span><span class="ig-val" id="ip-group"></span>
    <span class="ig-label">State 25°C</span><span class="ig-val" id="ip-state"></span>
    <span class="ig-label">Electron config</span><span class="ig-val" id="ip-cfg"></span>
  </div>
</div>

<div id="legend">
  <div class="leg"><div class="legdot" style="background:#ff6b6b"></div>Alkali</div>
  <div class="leg"><div class="legdot" style="background:#ffd93d"></div>Alkaline</div>
  <div class="leg"><div class="legdot" style="background:#74b9ff"></div>Transition</div>
  <div class="leg"><div class="legdot" style="background:#81ecec"></div>Post-transition</div>
  <div class="leg"><div class="legdot" style="background:#55efc4"></div>Metalloid</div>
  <div class="leg"><div class="legdot" style="background:#fd79a8"></div>Non-metal</div>
  <div class="leg"><div class="legdot" style="background:#a29bfe"></div>Noble Gas</div>
  <div class="leg"><div class="legdot" style="background:#e17055"></div>Lanthanide</div>
  <div class="leg"><div class="legdot" style="background:#fdcb6e"></div>Actinide</div>
</div>

  {n:113,s:"Nh",name:"Nihonium",mass:"286",cat:"post",g:13,p:7,state:"Solid",cfg:"[Rn]5f¹⁴6d¹⁰7s²7p¹"},

  {n:115,s:"Mc",name:"Moscovium",mass:"290",cat:"post",g:15,p:7,state:"Solid",cfg:"[Rn]5f¹⁴6d¹⁰7s²7p³"},
  {n:116,s:"Lv",name:"Livermorium",mass:"293",cat:"post",g:16,p:7,state:"Solid",cfg:"[Rn]5f¹⁴6d¹⁰7s²7p⁴"},
  {n:117,s:"Ts",name:"Tennessine",mass:"294",cat:"metalloid",g:17,p:7,state:"Solid",cfg:"[Rn]5f¹⁴6d¹⁰7s²7p⁵"},

const CAT_COLORS = {
  alkali:     '#ff6b6b',
  alkaline:   '#ffd93d',
  transition: '#74b9ff',
  post:       '#81ecec',
  metalloid:  '#55efc4',
  nonmetal:   '#fd79a8',
  noble:      '#a29bfe',
  lanthanide: '#e17055',
  actinide:   '#fdcb6e',
};
const CAT_BG = {
  alkali:     '#2a0808',
  alkaline:   '#2a2200',
  transition: '#08142a',
  post:       '#082a2a',
  metalloid:  '#082a1a',
  nonmetal:   '#2a082a',
  noble:      '#1a082a',
  lanthanide: '#2a1008',
  actinide:   '#2a1e00',
};

// ─── GRID POSITION ────────────────────────────────────────
function getGridPos(el) {
  let col = el.g - 1;
  let row = el.p - 1;
  if (el.cat === 'lanthanide') { row = 8; col = (el.n - 57) + 2; }
  if (el.cat === 'actinide' && el.n >= 89 && el.n <= 103) { row = 9; col = (el.n - 89) + 2; }
  return { row, col };
}

// ─── 3D POSITIONS ─────────────────────────────────────────
const COLS = 18, ROWS = 10;
const STEP = 62; // spacing between cards

function computePositions(shape) {
  const positions = [];
  ELEMENTS.forEach((el, i) => {
    const gp = getGridPos(el);
    const nx = (gp.col / (COLS - 1)) * 2 - 1; // -1..1
    const ny = (gp.row / (ROWS - 1)) * 2 - 1; // -1..1

    let x, y, z, rotX = 0, rotY = 0;
    const W = COLS * STEP, H = ROWS * STEP;

    if (shape === 'flat') {
      x = (gp.col - COLS/2) * STEP;
      y = (gp.row - ROWS/2) * STEP;
      z = 0;

    } else if (shape === 'wave') {
      x = (gp.col - COLS/2) * STEP;
      y = (gp.row - ROWS/2) * STEP;
      z = Math.sin(gp.col * 0.6) * 140 + Math.cos(gp.row * 0.8) * 80;

    } else if (shape === 'cylinder') {
      // Wrap columns around a cylinder
      const angle = (gp.col / COLS) * Math.PI * 2;
      const radius = 320;
      x = Math.sin(angle) * radius;
      z = Math.cos(angle) * radius - radius;
      y = (gp.row - ROWS/2) * STEP;
      rotY = -angle * (180 / Math.PI);

    } else if (shape === 'sphere') {
      // Map to sphere surface
      const theta = (gp.col / COLS) * Math.PI * 2;
      const phi = (gp.row / (ROWS - 1)) * Math.PI;
      const R = 380;
      x = R * Math.sin(phi) * Math.cos(theta);
      y = R * Math.cos(phi) - 0;
      z = R * Math.sin(phi) * Math.sin(theta) - R;
      rotY = -theta * (180 / Math.PI);
      rotX = (phi - Math.PI/2) * (180 / Math.PI);

    } else if (shape === 'spiral') {
      // Archimedes spiral in XZ, height by row
      const t = i / ELEMENTS.length;
      const angle = t * Math.PI * 6;
      const r = 80 + t * 280;
      x = Math.cos(angle) * r;
      z = Math.sin(angle) * r - 250;
      y = (gp.row - ROWS/2) * STEP * 0.6 + (t - 0.5) * 100;

    } else if (shape === 'helix') {
      // DNA-style double helix: two strands
      const strand = gp.col % 2;
      const t = (el.n - 1) / 117;
      const angle = t * Math.PI * 8 + strand * Math.PI;
      const R = 240;
      x = Math.cos(angle) * R;
      z = Math.sin(angle) * R - R;
      y = (t - 0.5) * 700;

    } else if (shape === 'mountain') {
      // Pyramid/mountain: peak at center, lower at edges
      x = (gp.col - COLS/2) * STEP;
      const distFromCenter = Math.abs(gp.col - COLS/2) / (COLS/2);
      const rowNorm = gp.row / (ROWS - 1);
      z = -(1 - distFromCenter) * 300 * (1 - rowNorm * 0.5);
      y = (gp.row - ROWS/2) * STEP;
    }

    positions.push({ x, y, z, rotX, rotY });
  });
  return positions;
}

// ─── CANVAS 3D ENGINE ─────────────────────────────────────
const canvas = document.getElementById('canvas3d');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Camera
let camRotX = -20, camRotY = 15;
let targetRotX = -20, targetRotY = 15;
let zoom = 1.0;
let targetZoom = 1.0;
let isDragging = false, lastMX, lastMY;
let autoRotate = true;

// Shape morph
let currentShape = 'flat';
let targetPositions = computePositions('flat');
let currentPositions = targetPositions.map(p => ({...p}));
let morphT = 1;
let morphFrom = null;
const MORPH_SPEED = 0.045;

// Filter
let activeFilter = 'all';

// Hover
let hoveredIdx = -1;
let mouseX = -9999, mouseY = -9999;

// ─── MATH HELPERS ─────────────────────────────────────────
function project(x, y, z) {
  // Apply camera rotation
  let rx = camRotX * Math.PI / 180;
  let ry = camRotY * Math.PI / 180;

  // Rotate Y
  let tx = x * Math.cos(ry) + z * Math.sin(ry);
  let tz = -x * Math.sin(ry) + z * Math.cos(ry);
  x = tx; z = tz;

  // Rotate X
  let ty = y * Math.cos(rx) - z * Math.sin(rx);
  tz = y * Math.sin(rx) + z * Math.cos(rx);
  y = ty; z = tz;

  // Perspective
  const fov = 700 * zoom;
  const dist = fov / (fov + z + 800);
  const px = W/2 + x * dist;
  const py = H/2 + y * dist;
  return { px, py, scale: dist, z };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPos(a, b, t) {
  return {
    x: lerp(a.x, b.x, t),
    y: lerp(a.y, b.y, t),
    z: lerp(a.z, b.z, t),
    rotX: lerp(a.rotX||0, b.rotX||0, t),
    rotY: lerp(a.rotY||0, b.rotY||0, t),
  };
}

// ─── DRAW ─────────────────────────────────────────────────
function drawCard(el, pos, proj, isHovered, isFiltered) {
  const { px, py, scale } = proj;
  const s = scale * 52;
  const hs = s / 2;
  const color = CAT_COLORS[el.cat] || '#888';
  const bg = CAT_BG[el.cat] || '#111';

  ctx.save();
  ctx.translate(px, py);

  const alpha = isFiltered ? 0.12 : 1.0;
  ctx.globalAlpha = alpha;

  if (isHovered && !isFiltered) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 18;
  }

  // Card background
  ctx.fillStyle = bg;
  ctx.strokeStyle = color;
  ctx.lineWidth = isHovered ? 1.5 : 0.8;
  const r = 4 * scale;
  roundRect(ctx, -hs, -hs, s, s, r);
  ctx.fill();
  ctx.stroke();

  if (isHovered) {
    ctx.shadowBlur = 0;
  }

  // Text
  const fs = Math.max(5, s * 0.15);
  ctx.fillStyle = color;
  ctx.textAlign = 'center';

  // atomic number
  ctx.font = `${fs * 0.7}px Courier New`;
  ctx.fillStyle = color + '99';
  ctx.fillText(el.n, 0, -hs + fs * 0.9);

  // symbol
  ctx.font = `bold ${fs * 1.3}px Courier New`;
  ctx.fillStyle = color;
  ctx.fillText(el.s, 0, fs * 0.4);

  // name (only if big enough)
  if (s > 28) {
    ctx.font = `${fs * 0.55}px Courier New`;
    ctx.fillStyle = color + 'aa';
    const nameStr = el.name.length > 9 ? el.name.slice(0,8)+'…' : el.name;
    ctx.fillText(nameStr, 0, hs - fs * 0.5);
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

let lastHitIdx = -1;
function render() {
  ctx.clearRect(0, 0, W, H);

  // Smooth camera
  camRotX += (targetRotX - camRotX) * 0.08;
  camRotY += (targetRotY - camRotY) * 0.08;
  zoom += (targetZoom - zoom) * 0.1;
  if (!isDragging && autoRotate) targetRotY += 0.12;

  // Morph
  if (morphT < 1) {
    morphT = Math.min(1, morphT + MORPH_SPEED);
    const ease = morphT < 0.5 ? 2*morphT*morphT : -1+(4-2*morphT)*morphT;
    for (let i = 0; i < ELEMENTS.length; i++) {
      currentPositions[i] = lerpPos(morphFrom[i], targetPositions[i], ease);
    }
  }

  // Project all
  const projected = ELEMENTS.map((el, i) => {
    const p = currentPositions[i];
    const proj = project(p.x, p.y, p.z);
    return { el, proj, i };
  });

  // Sort by Z (painter's algorithm)
  projected.sort((a, b) => b.proj.z - a.proj.z);

  // Hit test for hover
  let newHover = -1;
  for (let k = projected.length - 1; k >= 0; k--) {
    const { el, proj, i } = projected[k];
    const s = proj.scale * 52;
    const hs = s / 2;
    if (mouseX > proj.px - hs && mouseX < proj.px + hs &&
        mouseY > proj.py - hs && mouseY < proj.py + hs) {
      newHover = i;
      break;
    }
  }
  hoveredIdx = newHover;

  // Draw
  for (const { el, proj, i } of projected) {
    const isFiltered = activeFilter !== 'all' && el.cat !== activeFilter;
    drawCard(el, currentPositions[i], proj, hoveredIdx === i, isFiltered);
  }

  requestAnimationFrame(render);
}

// ─── EVENTS ───────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  if (isDragging) {
    targetRotY += (e.clientX - lastMX) * 0.35;
    targetRotX -= (e.clientY - lastMY) * 0.35;
    targetRotX = Math.max(-80, Math.min(80, targetRotX));
    lastMX = e.clientX; lastMY = e.clientY;
    autoRotate = false;
  }
});
canvas.addEventListener('mousedown', e => {
  isDragging = true; lastMX = e.clientX; lastMY = e.clientY;
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  setTimeout(() => { autoRotate = true; }, 2000);
});
canvas.addEventListener('wheel', e => {
  targetZoom *= e.deltaY > 0 ? 0.92 : 1.09;
  targetZoom = Math.max(0.3, Math.min(3.0, targetZoom));
}, { passive: true });

canvas.addEventListener('touchstart', e => {
  isDragging = true;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  targetRotY += (e.touches[0].clientX - lastMX) * 0.35;
  targetRotX -= (e.touches[0].clientY - lastMY) * 0.35;
  targetRotX = Math.max(-80, Math.min(80, targetRotX));
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  autoRotate = false;
}, { passive: true });
document.addEventListener('touchend', () => {
  isDragging = false;
  setTimeout(() => { autoRotate = true; }, 2000);
});

canvas.addEventListener('click', e => {
  if (hoveredIdx >= 0) showInfo(ELEMENTS[hoveredIdx]);
});

// ─── SHAPE CHANGE ─────────────────────────────────────────
function setShape(shape) {
  if (shape === currentShape) return;
  morphFrom = currentPositions.map(p => ({...p}));
  targetPositions = computePositions(shape);
  morphT = 0;
  currentShape = shape;
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-shape="${shape}"]`).classList.add('active');
  autoRotate = true;
}

document.querySelectorAll('.stab').forEach(btn => {
  btn.addEventListener('click', () => setShape(btn.dataset.shape));
});

// ─── FILTER ───────────────────────────────────────────────
document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.cat;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ─── INFO PANEL ───────────────────────────────────────────
function showInfo(el) {
  document.getElementById('ip-sym').textContent = el.s;
  document.getElementById('ip-name').textContent = el.name;
  document.getElementById('ip-num').textContent = el.n;
  document.getElementById('ip-mass').textContent = el.mass + ' u';
  document.getElementById('ip-cat').textContent = el.cat.charAt(0).toUpperCase() + el.cat.slice(1);
  document.getElementById('ip-period').textContent = el.p;
  document.getElementById('ip-group').textContent = el.g;
  document.getElementById('ip-state').textContent = el.state;
  document.getElementById('ip-cfg').textContent = el.cfg;
  document.getElementById('info-panel').style.display = 'block';
  document.getElementById('ip-sym').style.color = CAT_COLORS[el.cat] || '#7df9ff';
}
document.getElementById('close-info').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('info-panel').style.display = 'none';
});

render();
</script>
